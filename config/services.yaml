# This file is the entry point to configure your own services.
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration

parameters:
    mailer_from_default: 'no-reply@artconnect.local'
    mailer_from: '%env(default:mailer_from_default:MAILER_FROM)%'
    email_verification_ttl_hours: '%env(int:EMAIL_VERIFICATION_TTL_HOURS)%'
    password_reset_ttl_minutes: '%env(int:PASSWORD_RESET_TTL_MINUTES)%'
    stripe_publishable_key: '%env(default::STRIPE_PUBLISHABLE_KEY)%'
    openai_api_key: '%env(OPENAI_API_KEY)%'
    
    # Forum Scoring Configuration
    forum_scoring:
        weights:
            likes: 2.0
            dislikes: -1.0
            comments: 3.0
            views: 0.1
            time_decay_rate: 0.01
            base_score: 1.0
        anti_spam:
            view_cooldown: 300
            max_likes_per_hour: 10
            max_comments_per_hour: 20
        caching:
            score_update_interval: 300
            trending_cache_ttl: 600

services:
    # Configuration par défaut
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            int $emailVerificationTtlHours: '%email_verification_ttl_hours%'
            int $passwordResetTtlMinutes: '%password_reset_ttl_minutes%'

    # Enregistre toutes les classes de src/ comme services
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Configuration explicite du service d'envoi d'email
    App\Service\ResetPasswordMailer:
        arguments:
            $fromEmail: '%mailer_from%'

    # Configuration du service d'email personnalisé
    App\Service\EmailService:
        arguments:
            $adminEmail: '%mailer_from%'

    # Configuration du ForumMailService pour les notifications de forum
    App\Service\ForumMailService:

    App\Service\StripeService:
        arguments:
            $stripeSecretKey: '%env(default::STRIPE_SECRET_KEY)%'

    App\Controller\Event\StripeWebhookController:
        arguments:
            $stripeWebhookSecret: '%env(default::STRIPE_WEBHOOK_SECRET)%'

    App\Service\TicketPdfService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Forum Anti-Spam Service
    App\Service\ForumAntiSpamService:
        arguments:
            $config: '%forum_scoring%'

    # Test Email Commands
    App\Command\TestEmailSimpleCommand:
        arguments:
            $adminEmail: '%mailer_from%'
    
    App\Command\TestConnectionCommand:
        arguments:
            $mailerDsn: '%env(MAILER_DSN)%'
    
    App\Command\TestSmtpConnectionCommand:
        arguments:
            $mailerDsn: '%env(MAILER_DSN)%'
