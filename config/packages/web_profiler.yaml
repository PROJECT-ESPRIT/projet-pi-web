# https://symfony.com/doc/6.4/profiler.html
when@dev:
    web_profiler:
        toolbar: true
        intercept_redirects: false

    framework:
        profiler:
            enabled: true
            collect: true
            only_exceptions: false

when@test:
    web_profiler:
        toolbar: true
    framework:
        profiler:
            collect: false
